<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolhas — Um Estudo de Padrões</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap%27');
 
:root {
  --bg: #0a0a0f;
  --bg2: #0f0f18;
  --bg3: #13131e;
  --surface: #16161f;
  --surface2: #1c1c2a;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e6f0;
  --text2: #9b99ad;
  --text3: #5c5a6e;
  --accent: #c4b5d4;
  --accent2: #8b7aa8;
  --accent3: #6b5c8a;
  --empatia: #7ecfb0;
  --empatia2: #3d8a6e;
  --ansiedade: #e8c87a;
  --ansiedade2: #a07d30;
  --consistencia: #8ab4e8;
  --consistencia2: #3d6fa0;
  --solidao: #c47eb4;
  --solidao2: #7a3d6e;
  --presenca: #e88a8a;
  --presenca2: #a04040;
  --glow: rgba(196,181,212,0.08);
  --serif: 'IM Fell English', Georgia, serif;
  --mono: 'DM Mono', 'Courier New', monospace;
}
 
* { box-sizing: border-box; margin: 0; padding: 0; }
 
html { scroll-behavior: smooth; }
 
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}
 
/* ---- GRAIN OVERLAY ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
}
 
/* ---- AMBIENT ---- */
.ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.ambient-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0;
  transition: opacity 3s ease, transform 8s ease;
}
.orb1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(107,92,138,0.3) 0%, transparent 70%);
  top: -200px; left: -200px;
}
.orb2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(61,138,110,0.2) 0%, transparent 70%);
  bottom: -150px; right: -150px;
}
.orb3 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(160,64,64,0.15) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
 
/* ---- SCREENS ---- */
.screen {
  display: none;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}
.screen.active { display: flex; }
 
/* ---- INTRO SCREEN ---- */
#screen-intro {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
  text-align: center;
}
 
.intro-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 1s 0.5s forwards;
}
 
.intro-title {
  font-family: var(--serif);
  font-size: clamp(52px, 10vw, 96px);
  font-weight: 400;
  color: var(--text);
  line-height: 1.05;
  letter-spacing: -1px;
  margin-bottom: 16px;
  opacity: 0;
  animation: fadeUp 1s 0.8s forwards;
}
 
.intro-subtitle {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(16px, 3vw, 22px);
  color: var(--text3);
  margin-bottom: 56px;
  opacity: 0;
  animation: fadeUp 1s 1.1s forwards;
}
 
.intro-form {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  opacity: 0;
  animation: fadeUp 1s 1.4s forwards;
}
 
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-align: left;
}
 
.form-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3);
}
 
.form-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text);
  width: 100%;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.form-input:focus {
  border-color: var(--border2);
  background: var(--surface2);
}
.form-input::placeholder { color: var(--text3); }
 
.form-hint {
  font-size: 11px;
  color: var(--text3);
  font-style: italic;
  font-family: var(--serif);
  padding: 0 2px;
}
 
.btn-start {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 14px 32px;
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  align-self: stretch;
  margin-top: 8px;
}
.btn-start:hover {
  background: var(--surface);
  color: var(--text);
  border-color: var(--accent3);
}
 
.intro-disclaimer {
  margin-top: 48px;
  font-size: 11px;
  color: var(--text3);
  font-family: var(--serif);
  font-style: italic;
  max-width: 320px;
  line-height: 1.7;
  opacity: 0;
  animation: fadeUp 1s 1.7s forwards;
}
 
/* ---- GAME SCREEN ---- */
#screen-game {
  flex-direction: column;
  align-items: center;
  padding: 0;
}
 
/* HUD */
.hud {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to bottom, var(--bg) 60%, transparent);
  pointer-events: none;
}
 
.hud-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
 
.hud-name {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
}
 
.hud-chapter {
  font-family: var(--serif);
  font-size: 15px;
  color: var(--text2);
}
 
.hud-stats {
  display: flex;
  gap: 24px;
  pointer-events: none;
}
 
.hud-stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
 
.hud-stat-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
}
 
.hud-stat-bar {
  width: 48px;
  height: 2px;
  background: var(--surface2);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}
 
.hud-stat-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.8s ease;
}
 
.fill-empatia { background: var(--empatia); }
.fill-ansiedade { background: var(--ansiedade); }
.fill-consistencia { background: var(--consistencia); }
.fill-solidao { background: var(--solidao); }
.fill-presenca { background: var(--presenca); }
 
/* GAME MAIN */
.game-main {
  width: 100%;
  max-width: 640px;
  padding: 120px 24px 80px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
 
.chapter-header {
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  opacity: 0;
  animation: fadeIn 0.6s forwards;
}
 
.chapter-number {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
 
.chapter-title {
  font-family: var(--serif);
  font-size: clamp(24px, 5vw, 36px);
  color: var(--text);
  line-height: 1.2;
}
 
.chapter-epigraph {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--text3);
  margin-top: 10px;
  line-height: 1.6;
}
 
/* NARRATIVE */
.narrative-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
}
 
.narr-line {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text2);
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.5s ease, transform 0.5s ease, color 0.3s;
  padding: 3px 0;
}
 
.narr-line.visible {
  opacity: 1;
  transform: translateY(0);
}
 
.narr-line.emphasis {
  font-family: var(--serif);
  font-size: 17px;
  color: var(--text);
  font-style: italic;
}
 
.narr-line.system {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin: 16px 0 8px;
}
 
.narr-line.person-name {
  color: var(--accent);
  font-weight: 500;
}
 
.narr-line.separator {
  color: var(--text3);
  font-size: 13px;
  margin: 20px 0 12px;
}
 
.narr-line.memory {
  background: var(--surface);
  border-left: 2px solid var(--accent3);
  padding: 12px 16px;
  border-radius: 0 4px 4px 0;
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--text2);
  margin: 8px 0;
}
 
.narr-line.thought {
  color: var(--text3);
  font-style: italic;
  font-size: 14px;
  padding-left: 12px;
}
 
/* EVENT CARD */
.event-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin: 24px 0 16px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
 
.event-card.visible {
  opacity: 1;
  transform: translateY(0);
}
 
.event-tag {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
}
 
.event-text {
  font-family: var(--serif);
  font-size: 17px;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 4px;
}
 
.event-subtext {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.6;
  margin-top: 8px;
  font-style: italic;
  font-family: var(--serif);
}
 
/* CHOICES */
.choices-area {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
  margin-bottom: 32px;
}
 
.choice-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 20px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  transform: translateX(-8px);
}
 
.choice-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: var(--surface);
  transition: width 0.2s ease;
  z-index: 0;
}
 
.choice-btn:hover {
  border-color: var(--border2);
  color: var(--text);
}
 
.choice-btn:hover::before { width: 100%; }
 
.choice-btn:active { transform: scale(0.99); }
 
.choice-index {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  min-width: 16px;
  position: relative;
  z-index: 1;
}
 
.choice-text {
  position: relative;
  z-index: 1;
  line-height: 1.5;
}
 
.choice-btn.visible {
  opacity: 1;
  transform: translateX(0);
}
 
/* CHOICE EFFECT INDICATOR */
.choice-btn .choice-effect {
  margin-left: auto;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--text3);
  position: relative;
  z-index: 1;
  white-space: nowrap;
}
 
/* CURSOR */
.cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: var(--text3);
  margin-left: 2px;
  animation: blink 1.2s step-end infinite;
  vertical-align: middle;
}
 
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
 
/* FINAL SCREEN */
#screen-final {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 80px 24px;
  min-height: 100vh;
}
 
.final-container {
  width: 100%;
  max-width: 640px;
}
 
.final-header {
  text-align: center;
  margin-bottom: 64px;
}
 
.final-eyebrow {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 20px;
}
 
.final-title {
  font-family: var(--serif);
  font-size: clamp(32px, 7vw, 56px);
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 16px;
}
 
.final-subtitle {
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
  color: var(--text3);
  line-height: 1.6;
}
 
.profile-section {
  margin-bottom: 48px;
}
 
.profile-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
 
.profile-name {
  font-family: var(--serif);
  font-size: 28px;
  color: var(--accent);
  margin-bottom: 8px;
}
 
.profile-description {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.8;
  font-family: var(--serif);
  font-style: italic;
}
 
/* STAT BARS */
.stats-section {
  margin-bottom: 48px;
}
 
.stat-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}
 
.stat-name {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  min-width: 120px;
}
 
.stat-track {
  flex: 1;
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
 
.stat-fill-bar {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width 1.5s cubic-bezier(0.16,1,0.3,1);
}
 
.stat-num {
  font-size: 13px;
  color: var(--text2);
  min-width: 24px;
  text-align: right;
}
 
/* INSIGHTS */
.insights-section {
  margin-bottom: 48px;
}
 
.insight-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 24px;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
 
.insight-card.visible {
  opacity: 1;
  transform: translateY(0);
}
 
.insight-category {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
 
.insight-text {
  font-family: var(--serif);
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
}
 
/* CHOICES LOG */
.log-section {
  margin-bottom: 48px;
}
 
.log-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
 
.log-entry {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
 
.log-ch {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  min-width: 32px;
  padding-top: 2px;
}
 
.log-content {
  flex: 1;
}
 
.log-event {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}
 
.log-choice {
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
  font-family: var(--serif);
  margin-top: 3px;
}
 
/* FINAL ACTIONS */
.final-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
}
 
.btn-action {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 24px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
 
.btn-action:hover {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border2);
}
 
.btn-action.primary {
  border-color: var(--accent3);
  color: var(--accent);
}
 
.btn-action.primary:hover {
  background: rgba(107,92,138,0.1);
}
 
/* LOADING */
#screen-loading {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
 
.loading-text {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text3);
  animation: pulse 2s ease infinite;
}
 
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
 
/* TRANSITIONS */
.screen-transition {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}
 
.screen-transition.in { opacity: 1; }
 
/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
 
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
 
/* NOTIFICATION */
.notif {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 20px;
  font-size: 12px;
  color: var(--text2);
  z-index: 500;
  transform: translateY(16px);
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  max-width: 240px;
}
 
.notif.show {
  transform: translateY(0);
  opacity: 1;
}
 
/* AUDIO TOGGLE */
.audio-toggle {
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 14px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.2s;
}
 
.audio-toggle:hover {
  color: var(--text2);
  border-color: var(--border2);
}
 
/* CHAPTER TRANSITION OVERLAY */
.chapter-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
 
.chapter-overlay.show {
  opacity: 1;
  pointer-events: all;
}
 
.chapter-overlay-num {
  font-size: 10px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text3);
}
 
.chapter-overlay-title {
  font-family: var(--serif);
  font-size: 40px;
  color: var(--text);
  text-align: center;
}
 
/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
 
/* SAVE INDICATOR */
.save-indicator {
  position: fixed;
  top: 16px;
  right: 16px;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
}
 
.save-indicator.show { opacity: 1; }
 
/* Mobile */
@media (max-width: 600px) {
  .hud { padding: 12px 16px; }
  .hud-stats { gap: 12px; }
  .game-main { padding: 100px 16px 80px; }
  .hud-stat-bar { width: 32px; }
  #screen-intro { padding: 40px 20px; }
}
</style>
</head>
<body>
 
<div class="ambient">
  <div class="ambient-orb orb1" id="orb1"></div>
  <div class="ambient-orb orb2" id="orb2"></div>
  <div class="ambient-orb orb3" id="orb3"></div>
</div>
 
<div class="screen-transition" id="transition"></div>
<div class="chapter-overlay" id="chapterOverlay">
  <div class="chapter-overlay-num" id="overlayNum"></div>

// ============================================================
//  AUDIO ENGINE (Web Audio API procedural)
// ============================================================
let audioCtx = null;
let masterGain = null;
let dronePlaying = false;
let droneNodes = [];
 
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    masterGain.connect(audioCtx.destination);
    startAmbientDrone();
  } catch(e) {}
}
 
function startAmbientDrone() {
  if (!audioCtx || dronePlaying) return;
  dronePlaying = true;
  const freqs = [55, 82.5, 110, 165, 220];
  freqs.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    const detune = (Math.random() - 0.5) * 4;
    osc.detune.setValueAtTime(detune, audioCtx.currentTime);
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800, audioCtx.currentTime);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.06 / (i + 1), audioCtx.currentTime + 3);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    osc.start();
    droneNodes.push({ osc, gain, filter });
    const lfoRate = 0.03 + Math.random() * 0.05;
    const lfoDepth = 0.5 + Math.random() * 1;
    function modulateDetune() {
      if (!dronePlaying) return;
      const t = audioCtx.currentTime;
      osc.detune.linearRampToValueAtTime(detune + lfoDepth, t + (1/lfoRate)*0.5);
      osc.detune.linearRampToValueAtTime(detune - lfoDepth, t + (1/lfoRate));
      setTimeout(modulateDetune, (1/lfoRate) * 1000);
    }
    modulateDetune();
  });
}
 
function playChoiceSound(type) {
  if (!audioCtx || !estado.audioOn) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(masterGain);
  if (type === 'select') {
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(520, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
  } else if (type === 'chapter') {
    [220, 277, 330].forEach((f, i) => {
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.connect(g2); g2.connect(masterGain);
      o2.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.12);
      g2.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.12);
      g2.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i * 0.12 + 0.05);
      g2.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.12 + 0.4);
      o2.start(audioCtx.currentTime + i * 0.12);
      o2.stop(audioCtx.currentTime + i * 0.12 + 0.4);
    });
  } else if (type === 'final') {
    [110, 165, 220, 275].forEach((f, i) => {
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = 'sine';
      o2.connect(g2); g2.connect(masterGain);
      o2.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.2);
      g2.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.2);
      g2.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + i * 0.2 + 0.1);
      g2.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.2 + 1.5);
      o2.start(audioCtx.currentTime + i * 0.2);
      o2.stop(audioCtx.currentTime + i * 0.2 + 1.5);
    });
  }
}
 
function toggleAudio() {

      estado.audioOn ? 0.18 : 0,

  }
}

function calcularPerfil(stats) {
  for (let p of perfis) {
    if (p.condicao(stats)) return p;
  }
  return perfis[perfis.length - 1];
}

    insights.push({
      categoria: 'conexão',
      texto: `Você tentou se conectar com ${estado.pessoa} mais vezes do que recuou. Isso não é fraqueza — é uma escolha que muitos não fazem.`
    });
  }
 
  if (stats.ansiedade >= 5) {
    insights.push({
      categoria: 'ruminação',
      texto: 'Você passou tempo considerável pensando antes de agir. A análise te protege — mas às vezes chega atrasada demais para ajudar.'
    });
  }
 
  if (stats.solidao >= 5) {
    insights.push({
      categoria: 'distância',
      texto: `Sua resposta mais frequente quando ${estado.pessoa} aparece é criar espaço. É uma estratégia aprendida. Vale perguntar: o que ela está protegendo?`
    });
  }
 
  if (stats.consistencia >= 5) {
    insights.push({
      categoria: 'padrão',
      texto: 'Você tende a manter o mesmo comportamento mesmo quando ele não serve mais. Consistência e rigidez às vezes se parecem por fora.'
    });
  }
 
  if (stats.presenca >= 5) {
    insights.push({
      categoria: 'presença',
      texto: 'Você escolheu estar — mesmo quando não sabia como. Essa disposição para o desconforto é uma das formas mais raras de cuidado.'
    });
  }
 
  const tempoMin = Math.round((Date.now() - estado.startTime) / 60000);
  if (tempoMin >= 5) {
    insights.push({
      categoria: 'tempo',
      texto: `Você levou ${tempoMin} minutos. Escolhas rápidas demais não são decisões — são reflexos. Você parece saber a diferença.`
    });
  }
 
  if (insights.length === 0) {
    insights.push({
      categoria: 'observação',
      texto: `${estado.pessoa} continua presente nos seus padrões. O que você faz com alguém que não sai da sua cabeça diz mais sobre você do que sobre eles.`
    });
  }
 
  return insights;
}
 
// ============================================================
//  UTILITÁRIOS
// ============================================================
const delay = ms => new Promise(r => setTimeout(r, ms));
 
function clamp(v, min, max) {
  return Math.min(max, Math.max(min, v));
}
 
function aplicarEfeitos(efeito) {
  Object.entries(efeito).forEach(([stat, val]) => {
    estado.stats[stat] = clamp((estado.stats[stat] || 0) + val, 0, MAX_STAT);
  });
  atualizarBars();
}
 
function atualizarBars() {
  Object.entries(estado.stats).forEach(([stat, val]) => {
    const bar = document.getElementById(`bar-${stat}`);
    if (bar) {
      bar.style.width = `${(val / MAX_STAT) * 100}%`;
    }
  });
}
 
// ============================================================
//  SAVE / LOAD
// ============================================================
function salvar() {
  try {
    localStorage.setItem('escolhas_v2', JSON.stringify(estado));
    mostrarSaveIndicator();
  } catch(e) {}
}
 
function carregar() {
  try {
    const s = localStorage.getItem('escolhas_v2');
    if (s) {
      const saved = JSON.parse(s);
      estado = { ...estado, ...saved };
      return true;
    }
  } catch(e) {}
  return false;
}
 
function mostrarSaveIndicator() {
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
 
// ============================================================
//  NOTIFICAÇÕES
// ============================================================
function notif(msg, duration = 2500) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}
 
// ============================================================
//  AMBIENT LIGHT
// ============================================================
function setAmbientByChapter(ch) {
  document.getElementById('orb1').style.opacity = '1';
  document.getElementById('orb2').style.opacity = '1';
  const colors = [
    { o1: 'rgba(107,92,138,0.3)', o2: 'rgba(61,138,110,0.2)' },
    { o1: 'rgba(160,64,64,0.2)', o2: 'rgba(107,92,138,0.2)' },
    { o1: 'rgba(61,138,110,0.2)', o2: 'rgba(234,200,122,0.15)' },
    { o1: 'rgba(61,112,160,0.2)', o2: 'rgba(160,64,64,0.15)' },
    { o1: 'rgba(107,92,138,0.25)', o2: 'rgba(61,138,110,0.2)' }
  ];
  const c = colors[Math.min(ch - 1, colors.length - 1)];
  document.getElementById('orb1').style.background =
    `radial-gradient(circle, ${c.o1} 0%, transparent 70%)`;
  document.getElementById('orb2').style.background =
    `radial-gradient(circle, ${c.o2} 0%, transparent 70%)`;
}
 
// ============================================================
//  TRANSIÇÕES DE TELA
// ============================================================
async function transitionTo(fromId, toId) {
  const tr = document.getElementById('transition');
  tr.classList.add('in');
  await delay(500);
  document.getElementById(fromId).classList.remove('active');
  document.getElementById(toId).classList.add('active');
  tr.classList.remove('in');
}
 
async function mostrarChapterOverlay(numero, titulo) {
  playChoiceSound('chapter');
  const overlay = document.getElementById('chapterOverlay');
  document.getElementById('overlayNum').textContent = `Capítulo ${numero}`;
  document.getElementById('overlayTitle').textContent = titulo;
  overlay.classList.add('show');
  await delay(2200);
  overlay.classList.remove('show');
  await delay(600);
}
 
// ============================================================
//  RENDER DE LINHAS NARRATIVAS
// ============================================================
const narrativeArea = () => document.getElementById('narrative-area');
const choicesArea = () => document.getElementById('choices-area');
 
function limparArea() {
  narrativeArea().innerHTML = '';
  choicesArea().innerHTML = '';
}
 
async function escreverLinha(texto, tipo = 'normal', delayMs = 40) {
  const area = narrativeArea();
  const div = document.createElement('div');
  div.className = `narr-line ${tipo}`;
 
  const resolvedText = typeof texto === 'function' ? texto() : texto;
 
  area.appendChild(div);
 
  for (let i = 0; i < resolvedText.length; i++) {
    div.textContent += resolvedText[i];
    if (i % 3 === 0) await delay(delayMs);
  }
 
  div.classList.add('visible');
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  await delay(200);
}
 
async function escreverIntro(linhas) {
  for (const linha of linhas) {
    const texto = typeof linha.text === 'function' ? linha.text() : linha.text;
    await escreverLinha(texto, linha.type || 'normal', linha.type === 'thought' ? 25 : 30);
    await delay(150);
  }
  await delay(400);
}
 
// ============================================================
//  MOSTRAR EVENTO
// ============================================================
async function mostrarEvento(ev, eventoNum, totalEventos) {
  const area = narrativeArea();
 
  // Separador
  const sep = document.createElement('div');
  sep.className = 'narr-line separator visible';
  sep.textContent = `— ${eventoNum}/${totalEventos} —`;
  area.appendChild(sep);
  await delay(300);
 
  // Event card
  const card = document.createElement('div');
  card.className = 'event-card';
  card.innerHTML = `
    <div class="event-tag">${ev.tag}</div>
    <div class="event-text">${typeof ev.texto === 'function' ? ev.texto() : ev.texto}</div>
    ${ev.subtexto ? `<div class="event-subtext">${ev.subtexto}</div>` : ''}
  `;
  area.appendChild(card);
  await delay(100);
  card.classList.add('visible');
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  await delay(600);
}
 
// ============================================================
//  MOSTRAR ESCOLHAS
// ============================================================
function mostrarEscolhas(opcoes) {
  return new Promise(async (resolve) => {
    const area = choicesArea();
    area.innerHTML = '';
 
    for (let i = 0; i < opcoes.length; i++) {
      const op = opcoes[i];
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
 
      const efeitoLabel = Object.entries(op.efeito)
        .filter(([,v]) => v !== 0)
        .map(([k, v]) => `${v > 0 ? '+' : ''}${v} ${k.slice(0, 3)}`)
        .join(' ');
 
      btn.innerHTML = `
        <span class="choice-index">${['a', 'b', 'c'][i]}</span>
        <span class="choice-text">${op.texto}</span>
        <span class="choice-effect">${efeitoLabel}</span>
      `;
 
      btn.onclick = () => {
        playChoiceSound('select');
        document.querySelectorAll('.choice-btn').forEach(b => {
          b.style.opacity = '0.3';
          b.style.pointerEvents = 'none';
        });
        btn.style.opacity = '1';
        btn.style.borderColor = 'var(--border2)';
        resolve({ index: i, opcao: op });
      };
 
      area.appendChild(btn);
      await delay(120);
      btn.classList.add('visible');
    }
  });
}
 
// ============================================================
//  JOGO PRINCIPAL
// ============================================================
async function jogarCapitulo(capituloData, capNum) {
  limparArea();
  setAmbientByChapter(capNum);
 
  document.getElementById('hud-chapter').textContent =
    `Capítulo ${capituloData.numero} — ${capituloData.titulo}`;
 
  // Header do capítulo
  const area = narrativeArea();
  const header = document.createElement('div');
  header.className = 'chapter-header';
  header.innerHTML = `
    <div class="chapter-number">Capítulo ${capituloData.numero}</div>
    <div class="chapter-title">${capituloData.titulo}</div>
    <div class="chapter-epigraph">${capituloData.epigraph}</div>
  `;
  area.appendChild(header);
  await delay(800);
 
  // Intro narrativa
  await escreverIntro(capituloData.intro);
  await delay(600);
 
  // Eventos
  for (let i = 0; i < capituloData.eventos.length; i++) {
    const ev = capituloData.eventos[i];
    await mostrarEvento(ev, i + 1, capituloData.eventos.length);
 
    const resultado = await mostrarEscolhas(ev.opcoes);
 
    await delay(400);
 
    // Feedback da escolha
    const feedback = document.createElement('div');
    feedback.className = 'narr-line thought visible';
    feedback.textContent = `→ ${resultado.opcao.texto}`;
    area.appendChild(feedback);
 
    aplicarEfeitos(resultado.opcao.efeito);
 
    estado.log.push({
      capitulo: capituloData.numero,
      evento: typeof ev.texto === 'function' ? ev.texto() : ev.texto,
      escolha: resultado.opcao.texto,
      efeito: resultado.opcao.efeito
    });
 
    estado.decisoes.push(resultado.opcao.texto);
 
    choicesArea().innerHTML = '';
    salvar();
 
    await delay(800);
  }
}
 
// ============================================================
//  TELA FINAL
// ============================================================
async function mostrarFinal() {
  await transitionTo('screen-game', 'screen-final');
  playChoiceSound('final');
 
  const container = document.getElementById('final-container');
  container.innerHTML = '';
 
  const perfil = calcularPerfil(estado.stats);
  const insights = gerarInsights(estado.stats, estado.decisoes);
 
  // Header
  const header = document.createElement('div');
  header.className = 'final-header';
  header.style.opacity = '0';
  header.style.animation = 'fadeUp 0.8s 0.2s forwards';
  header.innerHTML = `
    <div class="final-eyebrow">análise concluída</div>
    <div class="final-title">${estado.nome}</div>
    <div class="final-subtitle">um estudo incompleto em ${estado.totalCapitulos} capítulos</div>
  `;
  container.appendChild(header);
  await delay(600);
 
  // Perfil
  const profileSec = document.createElement('div');
  profileSec.className = 'profile-section';
  profileSec.style.opacity = '0';
  profileSec.style.animation = 'fadeUp 0.8s 0.5s forwards';
  profileSec.innerHTML = `
    <div class="profile-title">tipo identificado</div>
    <div class="profile-name">${perfil.nome}</div>
    <div class="profile-description">${perfil.descricao}</div>
  `;
  container.appendChild(profileSec);
  await delay(400);
 
  // Stats
  const statsSec = document.createElement('div');
  statsSec.className = 'stats-section';
  statsSec.innerHTML = `<div class="profile-title" style="margin-bottom:20px;">dimensões</div>`;
 
  const statDefs = [
    { key: 'empatia', label: 'Empatia', color: 'var(--empatia)' },
    { key: 'presenca', label: 'Presença', color: 'var(--presenca)' },
    { key: 'consistencia', label: 'Consistência', color: 'var(--consistencia)' },
    { key: 'ansiedade', label: 'Ansiedade', color: 'var(--ansiedade)' },
    { key: 'solidao', label: 'Solidão', color: 'var(--solidao)' }
  ];
 
  statDefs.forEach(def => {
    const val = estado.stats[def.key] || 0;
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML = `
      <div class="stat-name">${def.label}</div>
      <div class="stat-track">
        <div class="stat-fill-bar" data-target="${(val/MAX_STAT)*100}" style="width:0%;background:${def.color}"></div>
      </div>
      <div class="stat-num">${val}/${MAX_STAT}</div>
    `;
    statsSec.appendChild(row);
  });
 
  container.appendChild(statsSec);
 
  // Animar barras
  await delay(300);
  statsSec.querySelectorAll('.stat-fill-bar').forEach(bar => {
    bar.style.width = bar.dataset.target + '%';
  });
  await delay(800);
 
  // Insights
  const insightsSec = document.createElement('div');
  insightsSec.className = 'insights-section';
  insightsSec.innerHTML = `<div class="profile-title" style="margin-bottom:20px;">observações</div>`;
  container.appendChild(insightsSec);
 
  for (let i = 0; i < insights.length; i++) {
    const ins = insights[i];
    const card = document.createElement('div');
    card.className = 'insight-card';
    card.innerHTML = `
      <div class="insight-category">${ins.categoria}</div>
      <div class="insight-text">${ins.texto}</div>
    `;
    insightsSec.appendChild(card);
    await delay(200);
    card.classList.add('visible');
    await delay(300);
  }
 
  // Log de decisões
  const logSec = document.createElement('div');
  logSec.className = 'log-section';
  logSec.innerHTML = `<div class="log-title">registro de escolhas</div>`;
 
  estado.log.forEach(entry => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <div class="log-ch">Cap ${entry.capitulo}</div>
      <div class="log-content">
        <div class="log-event">${entry.evento}</div>
        <div class="log-choice">→ ${entry.escolha}</div>
      </div>
    `;
    logSec.appendChild(div);
  });
 
  container.appendChild(logSec);
  await delay(300);
 
  // Nota final
  const notaFinal = document.createElement('div');
  notaFinal.style.cssText = 'font-family:var(--serif);font-style:italic;font-size:15px;color:var(--text3);line-height:1.8;text-align:center;padding:40px 0;opacity:0;animation:fadeUp 0.8s 0.5s forwards;';
  notaFinal.textContent = `"${estado.pessoa} foi um espelho. O que você viu diz mais sobre você do que sobre eles."`;
  container.appendChild(notaFinal);
  await delay(400);
 
  // Ações
  const actionDiv = document.createElement('div');
  actionDiv.className = 'final-actions';
  actionDiv.innerHTML = `
    <button class="btn-action primary" onclick="jogarNovamente()">jogar novamente</button>
    <button class="btn-action" onclick="resetarJogo()">novo jogo</button>
  `;
  container.appendChild(actionDiv);
}
 
// ============================================================
//  INICIAR / CONTROLE
// ============================================================
async function startGame() {
  const nome = document.getElementById('input-nome').value.trim();
  const pessoa = document.getElementById('input-pessoa').value.trim();
 
  if (!nome || !pessoa) {
    notif('preencha os dois campos para continuar');
    return;
  }
 
  initAudio();
 
  estado.nome = nome;
  estado.pessoa = pessoa;
  estado.startTime = Date.now();
  document.getElementById('hud-name').textContent = nome;
 
  await transitionTo('screen-intro', 'screen-game');
  salvar();
 
  for (let i = 0; i < capitulos.length; i++) {
    const cap = capitulos[i];
    if (i > 0) {
      await mostrarChapterOverlay(cap.numero, cap.titulo);
    }
    await jogarCapitulo(cap, i + 1);
    await delay(600);
  }
 
  await mostrarFinal();
}
 
async function jogarNovamente() {
  estado.stats = { empatia: 0, ansiedade: 0, consistencia: 0, solidao: 0, presenca: 0 };
  estado.log = [];
  estado.decisoes = [];
  estado.startTime = Date.now();
 
  document.getElementById('hud-chapter').textContent = 'Capítulo I';
  atualizarBars();
 
  await transitionTo('screen-final', 'screen-game');
 
  for (let i = 0; i < capitulos.length; i++) {
    const cap = capitulos[i];
    if (i > 0) await mostrarChapterOverlay(cap.numero, cap.titulo);
    await jogarCapitulo(cap, i + 1);
    await delay(600);
  }
 
  await mostrarFinal();
}
 
async function resetarJogo() {
  try { localStorage.removeItem('escolhas_v2'); } catch(e) {}
  location.reload();
}
 
// ============================================================
//  BOOT
// ============================================================
window.addEventListener('load', async () => {
  await delay(1200);
 
  const hasSave = carregar();
 
  await transitionTo('screen-loading', 'screen-intro');
 
  if (hasSave && estado.nome) {
    document.getElementById('input-nome').value = estado.nome;
    document.getElementById('input-pessoa').value = estado.pessoa;
    document.getElementById('btn-start').textContent = `continuar como ${estado.nome} →`;
  }
});
 
// Ativar áudio no primeiro clique
document.addEventListener('click', () => {
  if (!audioCtx && estado.audioOn) initAudio();
}, { once: true });
 
// Enter para iniciar
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.getElementById('screen-intro').classList.contains('active')) {
    startGame();
  }
});
</script>
